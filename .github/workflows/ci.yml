name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install PDF validation tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils qpdf

      - name: Install locked dependencies
        run: npm ci

      - name: Check syntax and unit tests
        run: |
          npm run test:syntax
          npm run test:action
          npm test

      - name: Validate GitHub workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 .github/workflows/ci.yml .github/workflows/release.yml

      - name: Check source package contents and dependency audit
        run: |
          npm run pack:check
          npm audit --audit-level=low

      - name: Exercise the public action contract
        uses: ./
        with:
          command: pipeline
          config: test/fixtures/basic/readme-press.config.mjs
          release-version: v0.0.0-ci.1
          source-commit: ${{ github.sha }}
          render-all: true
